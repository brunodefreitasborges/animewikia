<div
[@loadPage]="animationTapState"
*ngIf="currentAnime$ | async as home"
[ngStyle]="{'background-image': backgroundPoster
? 'url('+home.data.attributes.posterImage.original+')'
: 'url('+home.data.attributes.coverImage.original+')'}"
class="absolute top-16 h-[100vh] md:h-[140vh] w-full bg-cover bg-center lg:bg-left">
<mat-card class="flex-column justify-between w-[90vw] md:w-[768px] lg:w-[864px] p-4 md:p-12 mt-28 md:mt-36 ml-4 lg:ml-36  bg-black bg-opacity-70">
  <mat-card-header>
    <mat-card-title class="text-2xl md:text-4xl text-white font-poppins">{{home.data.attributes.canonicalTitle}}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <p class="text-gray-300 text-xs sm:text-sm md:text-md lg:text-lg font-poppins mt-4">{{home.data.attributes.description}}</p>
  </mat-card-content>
  <mat-card-footer class="flex-column md:flex justify-between items-center mt-4 pl-4 space-y-4">
    <div class="flex items-center space-x-8">
      <span class="text-white lg:text-lg italic">Rating: {{home.data.attributes.averageRating}} | 100</span>
      <mat-progress-spinner
      color="accent"
      class="h-14 w-14"
      strokeWidth="15"
      [value]="home.data.attributes.averageRating">
      </mat-progress-spinner>
    </div>
    <button (click)="getStreamingLink(home.data.id)"class="flex justify-start pl-2 items-center bg-primary-500 h-12 w-44 space-x-2 rounded-md hover:scale-110 hover:bg-primary-400">
      <mat-icon class="text-white">play_arrow</mat-icon>
      <span class="drop-shadow-md text-white text-xl font-poppins font-bold">Watch Now</span>
    </button>
  </mat-card-footer>
</mat-card>

<div>
  <mat-icon
  (click)="getPreviousAnime()"
  class="absolute text-primary-500 top-[40vh] max-sm:text-4xl max-sm:w-12 max-sm:h-12 max-sm:ml-2 w-24 h-24 xl:w-40 xl:h-40 -ml-8 xl:-ml-12 text-9xl xl:text-[212px] hover:cursor-pointer">keyboard_arrow_left</mat-icon>
  <mat-icon
  (click)="getNextAnime()"
  class="absolute top-[40vh] right-0 text-primary-500 max-sm:text-4xl max-sm:w-12 max-sm:h-12 max-sm:mr-0 w-24 h-24 xl:w-40 xl:h-40 text-9xl xl:text-[212px] hover:cursor-pointer">keyboard_arrow_right</mat-icon>
</div>

</div>
